<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%">
  <defs>
    <!-- Gradient Mesh Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E293B;#0F172A" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1E3A5F">
        <animate attributeName="stop-color" values="#1E3A5F;#0F172A;#1E3A5F" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E293B;#0F172A" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>

    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <!-- Animated Gradient Orbs -->
  <circle cx="200" cy="80" r="180" fill="#F97316" opacity="0.04" filter="url(#softGlow)">
    <animate attributeName="cx" values="200;280;200" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;160;80" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="240" r="220" fill="#14B8A6" opacity="0.04" filter="url(#softGlow)">
    <animate attributeName="cx" values="900;820;900" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="240;170;240" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="160" r="150" fill="#6366F1" opacity="0.03" filter="url(#softGlow)">
    <animate attributeName="r" values="150;190;150" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating Particles -->
  <g opacity="0.5">
    <circle cx="100" cy="60" r="2" fill="#F97316" filter="url(#glow)">
      <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="260" r="1.5" fill="#14B8A6" filter="url(#glow)">
      <animate attributeName="cy" values="260;235;260" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="45" r="1.8" fill="#FB923C" filter="url(#glow)">
      <animate attributeName="cy" values="45;28;45" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="280" r="1.5" fill="#2DD4BF" filter="url(#glow)">
      <animate attributeName="cy" values="280;255;280" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="70" r="2" fill="#F59E0B" filter="url(#glow)">
      <animate attributeName="cy" values="70;48;70" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="200" r="1.3" fill="#14B8A6" filter="url(#glow)">
      <animate attributeName="cy" values="200;180;200" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="1.8" fill="#6366F1" filter="url(#glow)">
      <animate attributeName="cy" values="220;198;220" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="55" r="1.5" fill="#F97316" filter="url(#glow)">
      <animate attributeName="cy" values="55;35;55" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Decorative Connection Lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5" fill="none">
    <line x1="100" y1="60" x2="300" y2="260">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="45" x2="750" y2="280">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" repeatCount="indefinite"/>
    </line>
    <line x1="950" y1="70" x2="1100" y2="200">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Main Title -->
  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="white" letter-spacing="-2">
    Yojana<tspan fill="url(#orangeGrad)">Saathi</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="165" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#94A3B8" letter-spacing="5">
    AI-POWERED WELFARE DISCOVERY PLATFORM
  </text>

  <!-- Accent line -->
  <rect x="440" y="182" width="320" height="2.5" rx="1.25" fill="url(#orangeGrad)" opacity="0.6">
    <animate attributeName="width" values="320;370;320" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="440;415;440" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Feature Chips -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600">
    <rect x="180" y="210" width="180" height="38" rx="19" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>
    <text x="270" y="235" text-anchor="middle" fill="#FB923C">🎯 Eligibility Engine</text>

    <rect x="385" y="210" width="155" height="38" rx="19" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.25)" stroke-width="1"/>
    <text x="462" y="235" text-anchor="middle" fill="#2DD4BF">🧠 AI Assistant</text>

    <rect x="565" y="210" width="175" height="38" rx="19" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="652" y="235" text-anchor="middle" fill="#818CF8">📄 Document Vault</text>

    <rect x="765" y="210" width="180" height="38" rx="19" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
    <text x="855" y="235" text-anchor="middle" fill="#FBBF24">✍️ Auto Drafting</text>
  </g>

  <!-- Bottom Metrics Bar -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="0" y="270" width="1200" height="50" fill="rgba(0,0,0,0.25)"/>

    <text x="200" y="298" text-anchor="middle" font-size="16" font-weight="800" fill="#F97316">1,000+</text>
    <text x="200" y="313" text-anchor="middle" font-size="11" fill="#64748B" letter-spacing="1.5">SCHEMES</text>

    <text x="400" y="298" text-anchor="middle" font-size="16" font-weight="800" fill="#14B8A6">121</text>
    <text x="400" y="313" text-anchor="middle" font-size="11" fill="#64748B" letter-spacing="1.5">TESTS PASSED</text>

    <text x="600" y="298" text-anchor="middle" font-size="16" font-weight="800" fill="#818CF8">6 Agents</text>
    <text x="600" y="313" text-anchor="middle" font-size="11" fill="#64748B" letter-spacing="1.5">PIPELINE</text>

    <text x="800" y="298" text-anchor="middle" font-size="16" font-weight="800" fill="#FB923C">100%</text>
    <text x="800" y="313" text-anchor="middle" font-size="11" fill="#64748B" letter-spacing="1.5">DETERMINISTIC</text>

    <text x="1000" y="298" text-anchor="middle" font-size="16" font-weight="800" fill="#2DD4BF">Zero PII</text>
    <text x="1000" y="313" text-anchor="middle" font-size="11" fill="#64748B" letter-spacing="1.5">LOGGED</text>
  </g>
</svg>
