<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <!-- Gradient Mesh Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E293B;#0F172A" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1E3A5F">
        <animate attributeName="stop-color" values="#1E3A5F;#0F172A;#1E3A5F" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E293B;#0F172A" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Orange Accent Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>

    <!-- Teal Accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- Animated Gradient Orbs -->
  <circle cx="200" cy="100" r="180" fill="#F97316" opacity="0.04" filter="url(#softGlow)">
    <animate attributeName="cx" values="200;280;200" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;180;100" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="300" r="220" fill="#14B8A6" opacity="0.04" filter="url(#softGlow)">
    <animate attributeName="cx" values="900;820;900" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="300;220;300" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="200" r="150" fill="#6366F1" opacity="0.03" filter="url(#softGlow)">
    <animate attributeName="r" values="150;190;150" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating Particles -->
  <g opacity="0.5">
    <circle cx="100" cy="80" r="2" fill="#F97316" filter="url(#glow)">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="320" r="1.5" fill="#14B8A6" filter="url(#glow)">
      <animate attributeName="cy" values="320;290;320" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="60" r="1.8" fill="#FB923C" filter="url(#glow)">
      <animate attributeName="cy" values="60;40;60" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="350" r="1.5" fill="#2DD4BF" filter="url(#glow)">
      <animate attributeName="cy" values="350;320;350" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="100" r="2" fill="#F59E0B" filter="url(#glow)">
      <animate attributeName="cy" values="100;75;100" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="250" r="1.3" fill="#14B8A6" filter="url(#glow)">
      <animate attributeName="cy" values="250;230;250" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="280" r="1.8" fill="#6366F1" filter="url(#glow)">
      <animate attributeName="cy" values="280;255;280" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="80" r="1.5" fill="#F97316" filter="url(#glow)">
      <animate attributeName="cy" values="80;55;80" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Decorative Connection Lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5" fill="none">
    <line x1="100" y1="80" x2="300" y2="320">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="60" x2="750" y2="350">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" repeatCount="indefinite"/>
    </line>
    <line x1="950" y1="100" x2="1100" y2="250">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Lamp Icon (YojanaSaathi diya) -->
  <g transform="translate(530, 95)" filter="url(#glow)">
    <!-- Flame -->
    <ellipse cx="70" cy="20" rx="12" ry="20" fill="url(#orangeGrad)" opacity="0.9">
      <animate attributeName="ry" values="20;24;20" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="22" rx="6" ry="12" fill="#FEF3C7" opacity="0.8">
      <animate attributeName="ry" values="12;15;12" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Diya base -->
    <path d="M50 42 Q60 55 70 58 Q80 55 90 42" fill="url(#orangeGrad)" opacity="0.7"/>
    <ellipse cx="70" cy="42" rx="22" ry="5" fill="url(#orangeGrad)" opacity="0.5"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" fill="white" letter-spacing="-1">
    Yojana<tspan fill="url(#orangeGrad)">Saathi</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="240" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#94A3B8" letter-spacing="4">
    AI-POWERED WELFARE DISCOVERY PLATFORM
  </text>

  <!-- Accent line under tagline -->
  <rect x="480" y="255" width="240" height="2" rx="1" fill="url(#orangeGrad)" opacity="0.6">
    <animate attributeName="width" values="240;280;240" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="480;460;480" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Feature Chips -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">
    <!-- Chip 1 -->
    <rect x="220" y="290" width="155" height="32" rx="16" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>
    <text x="297" y="311" text-anchor="middle" fill="#FB923C">🎯 Eligibility Engine</text>

    <!-- Chip 2 -->
    <rect x="395" y="290" width="130" height="32" rx="16" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.25)" stroke-width="1"/>
    <text x="460" y="311" text-anchor="middle" fill="#2DD4BF">🧠 AI Assistant</text>

    <!-- Chip 3 -->
    <rect x="545" y="290" width="145" height="32" rx="16" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="617" y="311" text-anchor="middle" fill="#818CF8">📄 Document Vault</text>

    <!-- Chip 4 -->
    <rect x="710" y="290" width="160" height="32" rx="16" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
    <text x="790" y="311" text-anchor="middle" fill="#FBBF24">✍️ Auto Drafting</text>
  </g>

  <!-- Bottom Metrics Bar -->
  <g font-family="'Segoe UI', system-ui, sans-serif">
    <rect x="0" y="355" width="1200" height="45" fill="rgba(0,0,0,0.2)"/>
    
    <text x="200" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#F97316">1,000+</text>
    <text x="200" y="395" text-anchor="middle" font-size="9" fill="#64748B" letter-spacing="1">SCHEMES</text>

    <text x="400" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#14B8A6">121</text>
    <text x="400" y="395" text-anchor="middle" font-size="9" fill="#64748B" letter-spacing="1">TESTS PASSED</text>

    <text x="600" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#818CF8">6 Agents</text>
    <text x="600" y="395" text-anchor="middle" font-size="9" fill="#64748B" letter-spacing="1">PIPELINE</text>

    <text x="800" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#FB923C">100%</text>
    <text x="800" y="395" text-anchor="middle" font-size="9" fill="#64748B" letter-spacing="1">DETERMINISTIC</text>

    <text x="1000" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#2DD4BF">Zero PII</text>
    <text x="1000" y="395" text-anchor="middle" font-size="9" fill="#64748B" letter-spacing="1">LOGGED</text>
  </g>
</svg>
