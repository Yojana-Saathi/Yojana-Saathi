<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="100%">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="20%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#14B8A6"/>
      <stop offset="80%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>
  <rect x="0" y="18" width="1200" height="2" fill="url(#divGrad)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="600" cy="19" r="4" fill="#F97316" opacity="0.6">
    <animate attributeName="r" values="4;5;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
