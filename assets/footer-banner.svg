<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" width="100%">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E293B;#0F172A" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#1E293B">
        <animate attributeName="stop-color" values="#1E293B;#0F172A;#1E293B" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>

    <filter id="footerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="footerSoftGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="footerGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="180" fill="url(#footerBg)"/>
  <rect width="1200" height="180" fill="url(#footerGrid)"/>

  <!-- Background orbs -->
  <circle cx="150" cy="90" r="120" fill="#F97316" opacity="0.03" filter="url(#footerSoftGlow)">
    <animate attributeName="cx" values="150;200;150" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="90" r="100" fill="#14B8A6" opacity="0.03" filter="url(#footerSoftGlow)">
    <animate attributeName="cx" values="1050;1000;1050" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Top wave decoration -->
  <path d="M0 0 Q150 25 300 10 T600 15 T900 8 T1200 18 L1200 0 Z" fill="url(#waveGrad1)" opacity="0.06">
    <animate attributeName="d"
      values="M0 0 Q150 25 300 10 T600 15 T900 8 T1200 18 L1200 0 Z;
              M0 0 Q150 12 300 22 T600 8 T900 18 T1200 10 L1200 0 Z;
              M0 0 Q150 25 300 10 T600 15 T900 8 T1200 18 L1200 0 Z"
      dur="8s" repeatCount="indefinite"/>
  </path>
  <path d="M0 0 Q200 18 400 8 T800 12 T1200 8 L1200 0 Z" fill="url(#waveGrad2)" opacity="0.04">
    <animate attributeName="d"
      values="M0 0 Q200 18 400 8 T800 12 T1200 8 L1200 0 Z;
              M0 0 Q200 8 400 16 T800 6 T1200 14 L1200 0 Z;
              M0 0 Q200 18 400 8 T800 12 T1200 8 L1200 0 Z"
      dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Floating Particles -->
  <g opacity="0.4">
    <circle cx="80" cy="50" r="1.5" fill="#F97316" filter="url(#footerGlow)">
      <animate attributeName="cy" values="50;35;50" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="120" r="1.2" fill="#14B8A6" filter="url(#footerGlow)">
      <animate attributeName="cy" values="120;105;120" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="40" r="1.5" fill="#818CF8" filter="url(#footerGlow)">
      <animate attributeName="cy" values="40;25;40" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="130" r="1.3" fill="#FB923C" filter="url(#footerGlow)">
      <animate attributeName="cy" values="130;115;130" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="55" r="1.5" fill="#2DD4BF" filter="url(#footerGlow)">
      <animate attributeName="cy" values="55;40;55" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Separator line -->
  <rect x="380" y="40" width="440" height="1.5" rx="0.75" fill="url(#waveGrad1)" opacity="0.15">
    <animate attributeName="width" values="440;490;440" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="380;355;380" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="600" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" fill="#94A3B8" letter-spacing="1.5">
    Connecting Citizens to Government Entitlements
  </text>

  <!-- Brand Name -->
  <text x="600" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="38" fill="white" letter-spacing="-0.5">
    Yojana<tspan fill="url(#waveGrad1)">Saathi</tspan>
  </text>

  <!-- Links Row -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="500" fill="#64748B">
    <text x="340" y="140" text-anchor="middle">GitHub</text>
    <text x="410" y="140" text-anchor="middle" fill="#334155">·</text>
    <text x="480" y="140" text-anchor="middle">Documentation</text>
    <text x="560" y="140" text-anchor="middle" fill="#334155">·</text>
    <text x="640" y="140" text-anchor="middle">API Reference</text>
    <text x="720" y="140" text-anchor="middle" fill="#334155">·</text>
    <text x="800" y="140" text-anchor="middle">MIT License</text>
    <text x="870" y="140" text-anchor="middle" fill="#334155">·</text>
    <text x="940" y="140" text-anchor="middle">Contributing</text>
  </g>

  <!-- Copyright -->
  <text x="600" y="165" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#475569" letter-spacing="0.5">
    © 2025 YojanaSaathi · Built with ❤️ to put unclaimed welfare into the right hands
  </text>

  <!-- Bottom Accent Line -->
  <rect x="0" y="175" width="1200" height="5" fill="url(#waveGrad1)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.65;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
