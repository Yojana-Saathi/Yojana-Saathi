<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E293B;#0F172A" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#1E293B">
        <animate attributeName="stop-color" values="#1E293B;#0F172A;#1E293B" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316" />
      <stop offset="50%" style="stop-color:#FB923C" />
      <stop offset="100%" style="stop-color:#F59E0B" />
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6" />
      <stop offset="100%" style="stop-color:#2DD4BF" />
    </linearGradient>

    <filter id="footerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="footerSoftGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="footerGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#footerBg)"/>
  <rect width="1200" height="200" fill="url(#footerGrid)"/>

  <!-- Background orbs -->
  <circle cx="150" cy="100" r="120" fill="#F97316" opacity="0.03" filter="url(#footerSoftGlow)">
    <animate attributeName="cx" values="150;200;150" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="100" r="100" fill="#14B8A6" opacity="0.03" filter="url(#footerSoftGlow)">
    <animate attributeName="cx" values="1050;1000;1050" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Top wave decoration -->
  <path d="M0 0 Q150 35 300 15 T600 20 T900 10 T1200 25 L1200 0 Z" fill="url(#waveGrad1)" opacity="0.06">
    <animate attributeName="d" 
      values="M0 0 Q150 35 300 15 T600 20 T900 10 T1200 25 L1200 0 Z;
              M0 0 Q150 20 300 30 T600 12 T900 25 T1200 15 L1200 0 Z;
              M0 0 Q150 35 300 15 T600 20 T900 10 T1200 25 L1200 0 Z"
      dur="8s" repeatCount="indefinite"/>
  </path>
  <path d="M0 0 Q200 25 400 10 T800 18 T1200 12 L1200 0 Z" fill="url(#waveGrad2)" opacity="0.04">
    <animate attributeName="d"
      values="M0 0 Q200 25 400 10 T800 18 T1200 12 L1200 0 Z;
              M0 0 Q200 12 400 22 T800 8 T1200 20 L1200 0 Z;
              M0 0 Q200 25 400 10 T800 18 T1200 12 L1200 0 Z"
      dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Floating Particles -->
  <g opacity="0.4">
    <circle cx="80" cy="60" r="1.5" fill="#F97316" filter="url(#footerGlow)">
      <animate attributeName="cy" values="60;45;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="140" r="1.2" fill="#14B8A6" filter="url(#footerGlow)">
      <animate attributeName="cy" values="140;125;140" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="50" r="1.5" fill="#818CF8" filter="url(#footerGlow)">
      <animate attributeName="cy" values="50;35;50" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="150" r="1.3" fill="#FB923C" filter="url(#footerGlow)">
      <animate attributeName="cy" values="150;135;150" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="70" r="1.5" fill="#2DD4BF" filter="url(#footerGlow)">
      <animate attributeName="cy" values="70;55;70" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Horizontal separator line -->
  <rect x="400" y="55" width="400" height="1" rx="0.5" fill="url(#waveGrad1)" opacity="0.15">
    <animate attributeName="width" values="400;440;400" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="400;380;400" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="600" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="600" font-size="16" fill="#94A3B8" letter-spacing="1">
    Connecting Citizens to Government Entitlements
  </text>

  <!-- Brand Name -->
  <text x="600" y="125" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" fill="white" letter-spacing="-0.5">
    Yojana<tspan fill="url(#waveGrad1)">Saathi</tspan>
  </text>

  <!-- Links Row -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">
    <text x="380" y="155" text-anchor="middle">GitHub</text>
    <text x="440" y="155" text-anchor="middle" fill="#334155">·</text>
    <text x="500" y="155" text-anchor="middle">Documentation</text>
    <text x="560" y="155" text-anchor="middle" fill="#334155">·</text>
    <text x="620" y="155" text-anchor="middle">API Reference</text>
    <text x="680" y="155" text-anchor="middle" fill="#334155">·</text>
    <text x="740" y="155" text-anchor="middle">MIT License</text>
    <text x="800" y="155" text-anchor="middle" fill="#334155">·</text>
    <text x="860" y="155" text-anchor="middle">Contributing</text>
  </g>

  <!-- Copyright -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#475569" letter-spacing="0.5">
    © 2025 YojanaSaathi · Built with ❤️ to put unclaimed welfare into the right hands
  </text>

  <!-- Bottom Accent Line -->
  <rect x="0" y="196" width="1200" height="4" fill="url(#waveGrad1)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
